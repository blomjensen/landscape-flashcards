  const [direction, setDirection] = React.useState(1);

  const word = vocab[index];
  const cat = categoryColors[word.category] || { bg: "#1a2a3a", chip: "#81d4fa", chipText: "#0a1f2e" };

  const goTo = (dir) => {
    if (animating) return;
    setAnimating(true);
    setDirection(dir);
    setTimeout(() => {
      setIndex((prev) => (prev + dir + vocab.length) % vocab.length);
      setFlipped(false);
      setRevealed(false);
      setAnimating(false);
    }, 280);
  };

  React.useEffect(() => {
    const handler = (e) => {
      if (e.key === "ArrowRight") goTo(1);
      if (e.key === "ArrowLeft") goTo(-1);
      if (e.key === " ") setRevealed(r => !r);
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, [animating]);

  return (
    <div style={{
      minHeight: "100vh",
      background: "#0a0f14",
      display: "flex",
      flexDirection: "column",
      alignItems: "center",
      justifyContent: "center",
      fontFamily: "'Georgia', 'Times New Roman', serif",
      padding: "24px 16px",
    }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap');

        .card { transition: opacity 0.28s ease, transform 0.28s ease; }
        .card.exit { opacity: 0; transform: translateX(${direction > 0 ? '-' : ''}40px); }

        .reveal-btn {
          background: none;
          border: 1px solid rgba(255,255,255,0.2);
          color: rgba(255,255,255,0.6);
          padding: 10px 24px;
          border-radius: 2px;
          font-family: 'IBM Plex Mono', monospace;
          font-size: 0.75rem;
          letter-spacing: 0.12em;
          cursor: pointer;
          transition: all 0.2s;
          text-transform: uppercase;
        }
        .reveal-btn:hover {
          border-color: rgba(255,255,255,0.5);
          color: rgba(255,255,255,0.9);
          background: rgba(255,255,255,0.05);
        }

        .nav-btn {
          background: none;
          border: none;
          color: rgba(255,255,255,0.35);
          font-size: 1.8rem;
          cursor: pointer;
          padding: 8px 16px;
          transition: color 0.2s;
          line-height: 1;
        }
        .nav-btn:hover { color: rgba(255,255,255,0.8); }

        .chip {
          display: inline-block;
          padding: 3px 12px;
          border-radius: 1px;
          font-family: 'IBM Plex Mono', monospace;
          font-size: 0.68rem;
          letter-spacing: 0.15em;
          text-transform: uppercase;
          font-weight: 500;
        }

        .example-reveal {
          animation: fadeUp 0.4s ease forwards;
        }
        @keyframes fadeUp {
          from { opacity: 0; transform: translateY(8px); }
          to { opacity: 1; transform: translateY(0); }
        }

        .progress-dot {
          width: 5px;
          height: 5px;
          border-radius: 50%;
          background: rgba(255,255,255,0.15);
          transition: background 0.3s;
          display: inline-block;
          margin: 0 2px;
        }
        .progress-dot.active {
          background: rgba(255,255,255,0.75);
        }
      `}</style>

      {/* Header */}
      <div style={{
        fontFamily: "'IBM Plex Mono', monospace",
        fontSize: "0.65rem",
        letterSpacing: "0.25em",
        color: "rgba(255,255,255,0.3)",
        textTransform: "uppercase",
        marginBottom: "40px",
        textAlign: "center"
      }}>
        Landscape Architecture · Vocabulary
      </div>

      {/* Card */}
      <div
        className={`card ${animating ? 'exit' : ''}`}
        style={{
          background: cat.bg,
          borderRadius: "4px",
          width: "100%",
          maxWidth: "560px",
          minHeight: "380px",
          padding: "48px 48px 40px",
          boxShadow: `0 24px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.06)`,
          display: "flex",
          flexDirection: "column",
          gap: "24px",
          position: "relative",
        }}
      >
        {/* Category chip */}
        <div>
          <span className="chip" style={{ background: cat.chip, color: cat.chipText }}>
            {word.category}
          </span>
        </div>

        {/* Main term */}
        <div>
          <div style={{
            fontFamily: "'Playfair Display', Georgia, serif",
            fontSize: "clamp(2rem, 5vw, 3rem)",
            fontWeight: 700,
            color: "#ffffff",
            lineHeight: 1.1,
            marginBottom: "8px",
          }}>
            {word.term}
          </div>
          <div style={{
            fontFamily: "'IBM Plex Mono', monospace",
            fontSize: "0.85rem",
            color: cat.chip,
            marginBottom: "4px",
          }}>
            <PhoneticSymbol text={word.ipa} />
          </div>
          <div style={{
            fontFamily: "'Playfair Display', Georgia, serif",
            fontStyle: "italic",
            fontSize: "1.05rem",
            color: "rgba(255,255,255,0.5)",
          }}>
            {word.norsk}
          </div>
        </div>

        {/* Definition */}
        <div style={{
          fontFamily: "'Georgia', serif",
          fontSize: "0.975rem",
          color: "rgba(255,255,255,0.82)",
          lineHeight: 1.7,
          borderLeft: `2px solid ${cat.chip}`,
          paddingLeft: "16px",
        }}>
          {word.definition}
        </div>

        {/* Example reveal */}
        {!revealed ? (
          <button className="reveal-btn" onClick={() => setRevealed(true)}>
            ↓ Show example sentence
          </button>
        ) : (
          <div className="example-reveal" style={{
            fontFamily: "'Playfair Display', Georgia, serif",
            fontStyle: "italic",
            fontSize: "0.9rem",
            color: "rgba(255,255,255,0.55)",
            lineHeight: 1.65,
            paddingTop: "4px",
          }}>
            "{word.example}"
          </div>
        )}
      </div>

      {/* Navigation */}
      <div style={{
        display: "flex",
        alignItems: "center",
        gap: "16px",
        marginTop: "32px",
      }}>
        <button className="nav-btn" onClick={() => goTo(-1)}>←</button>
        <div style={{
          fontFamily: "'IBM Plex Mono', monospace",
          fontSize: "0.7rem",
          color: "rgba(255,255,255,0.3)",
          letterSpacing: "0.1em",
          minWidth: "60px",
          textAlign: "center",
        }}>
          {index + 1} / {vocab.length}
        </div>
        <button className="nav-btn" onClick={() => goTo(1)}>→</button>
      </div>

      {/* Progress dots */}
      <div style={{ marginTop: "16px" }}>
        {vocab.map((_, i) => (
          <span
            key={i}
            className={`progress-dot ${i === index ? 'active' : ''}`}
            onClick={() => { setIndex(i); setFlipped(false); setRevealed(false); }}
            style={{ cursor: "pointer" }}
          />
        ))}
      </div>

      {/* Keyboard hint */}
      <div style={{
        fontFamily: "'IBM Plex Mono', monospace",
        fontSize: "0.62rem",
        color: "rgba(255,255,255,0.18)",
        letterSpacing: "0.1em",
        marginTop: "28px",
        textAlign: "center",
      }}>
        ← → navigate &nbsp;·&nbsp; space to reveal example
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
